<!DOCTYPE html>
<html>
<head>
<title>TaskHub</title>
<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
padding:40px;
}

.task{
background:white;
padding:20px;
margin:20px;
border-radius:8px;
width:300px;
display:inline-block;
}

button{
background:#00a651;
color:white;
border:none;
padding:10px 20px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>TaskHub Micro Tasks</h1>

<div class="task">
<h3>YouTube Subscribe</h3>
<p>Subscribe to a channel</p>
<b>$0.10</b>
<br><br>
<button>Start Task</button>
</div>

<div class="task">
<h3>Instagram Follow</h3>
<p>Follow a profile</p>
<b>$0.05</b>
<br><br>
<button>Start Task</button>
</div>

<div class="task">
<h3>Website Signup</h3>
<p>Create an account</p>
<b>$0.20</b>
<br><br>
<button>Start Task</button>
</div>

</body>
</html>
